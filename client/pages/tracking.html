<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Your Shipment | RoutePeak Logistics</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Tracking Page Styles */
        .tracking-hero {
            background: linear-gradient(135deg, #0D1B3D 0%, #1a2d5a 100%);
            padding: 100px 8% 60px;
            text-align: center;
            color: white;
        }

        .tracking-hero h1 {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .tracking-hero p {
            color: #b0c4de;
            font-size: 18px;
            margin-bottom: 40px;
        }

        .tracking-search-box {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            gap: 15px;
            background: white;
            padding: 8px;
            border-radius: 60px;
            box-shadow: 0 20px 60px rgba(0,0,0,.3);
        }

        .tracking-search-box input {
            flex: 1;
            padding: 18px 25px;
            border: none;
            border-radius: 60px;
            font-size: 16px;
            background: transparent;
            color: #0D1B3D;
        }

        .tracking-search-box input:focus {
            outline: none;
        }

        .tracking-search-box input::placeholder {
            color: #999;
        }

        .tracking-search-box button {
            padding: 16px 35px;
            background: #FF6A00;
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: .3s;
        }

        .tracking-search-box button:hover {
            background: #e85f00;
            transform: scale(1.02);
        }

        /* Results Section */
        .tracking-results {
            max-width: 900px;
            margin: -30px auto 60px;
            padding: 0 20px;
            display: none;
        }

        .tracking-results.active {
            display: block;
        }

        .result-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,.1);
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            padding-bottom: 25px;
            border-bottom: 2px solid #f0f0f0;
            margin-bottom: 30px;
        }

        .result-header .tracking-number {
            font-size: 28px;
            font-weight: 700;
            color: #0D1B3D;
        }

        .result-header .tracking-number small {
            font-size: 14px;
            font-weight: 400;
            color: #999;
            display: block;
        }

        .status-badge-large {
            display: inline-block;
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 700;
        }

        .status-delivered {
            background: #d4f5d4;
            color: #27ae60;
        }

        .status-transit {
            background: #d4e9ff;
            color: #1a73e8;
        }

        .status-registered {
            background: #e8e8e8;
            color: #666;
        }

        .status-customs {
            background: #fff3d4;
            color: #e67e22;
        }

        .status-out {
            background: #f0d4f5;
            color: #8e44ad;
        }

        .shipment-details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 35px;
        }

        .detail-item {
            background: #f8faff;
            padding: 18px 22px;
            border-radius: 14px;
        }

        .detail-item .label {
            font-size: 12px;
            text-transform: uppercase;
            color: #999;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .detail-item .value {
            font-size: 16px;
            font-weight: 600;
            color: #0D1B3D;
            margin-top: 5px;
        }

        .timeline-section {
            margin-top: 30px;
        }

        .timeline-section h3 {
            margin-bottom: 25px;
            color: #0D1B3D;
        }

        .timeline {
            position: relative;
            padding-left: 30px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 7px;
            top: 8px;
            bottom: 8px;
            width: 3px;
            background: #e0e0e0;
        }

        .timeline-item {
            position: relative;
            padding: 0 0 35px 25px;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -25px;
            top: 6px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #FF6A00;
            border: 3px solid white;
            box-shadow: 0 0 0 3px #FF6A00;
        }

        .timeline-item:last-child {
            padding-bottom: 0;
        }

        .timeline-item .timeline-status {
            font-weight: 700;
            color: #0D1B3D;
            font-size: 16px;
        }

        .timeline-item .timeline-location {
            color: #666;
            font-size: 14px;
        }

        .timeline-item .timeline-date {
            color: #999;
            font-size: 13px;
            margin-top: 4px;
        }

        .timeline-item .timeline-description {
            color: #555;
            font-size: 14px;
            margin-top: 4px;
        }

        .not-found {
            background: white;
            border-radius: 24px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,.1);
        }

        .not-found i {
            font-size: 60px;
            color: #e74c3c;
            margin-bottom: 20px;
        }

        .not-found h2 {
            color: #0D1B3D;
            margin-bottom: 10px;
        }

        .not-found p {
            color: #999;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .tracking-hero h1 {
                font-size: 32px;
            }

            .tracking-search-box {
                flex-direction: column;
                border-radius: 20px;
                padding: 15px;
                background: white;
            }

            .tracking-search-box input {
                padding: 15px;
                background: #f5f5f5;
                border-radius: 12px;
            }

            .tracking-search-box button {
                width: 100%;
                padding: 16px;
            }

            .shipment-details-grid {
                grid-template-columns: 1fr;
            }

            .result-header {
                flex-direction: column;
                text-align: center;
            }

            .result-header .tracking-number {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

<!-- Navbar -->
<header>
    <nav class="navbar">
        <div class="logo">
            <a href="/index.html">
                <img src="/images/logo.png" alt="RoutePeak" style="width:180px;">
            </a>
        </div>
        <ul class="nav-links">
            <li><a href="/index.html">Home</a></li>
            <li><a href="/pages/tracking.html" style="color:#FF6A00;">Track</a></li>
        </ul>
    </nav>
</header>

<!-- Hero Section -->
<section class="tracking-hero">
    <h1>🔍 Track Your Shipment</h1>
    <p>Enter your tracking number to get real-time updates on your package</p>
    
    <div class="tracking-search-box">
        <input type="text" id="trackingInput" placeholder="Enter tracking number (e.g., RPL82385239109)">
        <button onclick="trackShipment()">Track Now</button>
    </div>
</section>

<!-- Results Section -->
<div class="tracking-results" id="trackingResults">
    <!-- Results will be rendered here -->
</div>

<footer style="background:#09142D;color:white;padding:40px 10%;text-align:center;margin-top:60px;">
    <p>&copy; 2026 RoutePeak Logistics. All rights reserved.</p>
</footer>

<script src="/js/tracking.js"></script>

<!-- ========================================
     WHATSAPP FLOATING BUTTON
     ======================================== -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
    /* WhatsApp Floating Button */
    .whatsapp-float {
        position: fixed;
        bottom: 30px;
        right: 30px;
        z-index: 9999;
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
        animation: whatsappPulse 2s infinite;
        transition: all 0.3s ease;
    }

    .whatsapp-float .icon {
        width: 60px;
        height: 60px;
        background: #25D366;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 20px rgba(37, 211, 102, 0.4);
        transition: all 0.3s ease;
    }

    .whatsapp-float .icon i {
        color: white;
        font-size: 32px;
    }

    .whatsapp-float .icon:hover {
        transform: scale(1.1);
        box-shadow: 0 6px 30px rgba(37, 211, 102, 0.6);
    }

    .whatsapp-float .tooltip {
        background: #075E54;
        color: white;
        padding: 10px 18px;
        border-radius: 30px;
        font-size: 14px;
        font-weight: 500;
        white-space: nowrap;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        opacity: 0;
        transform: translateX(20px);
        transition: all 0.3s ease;
        pointer-events: none;
    }

    .whatsapp-float:hover .tooltip {
        opacity: 1;
        transform: translateX(0);
    }

    @keyframes whatsappPulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.05); }
        100% { transform: scale(1); }
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
        .whatsapp-float {
            bottom: 20px;
            right: 20px;
        }

        .whatsapp-float .icon {
            width: 55px;
            height: 55px;
        }

        .whatsapp-float .icon i {
            font-size: 28px;
        }

        .whatsapp-float .tooltip {
            display: none;
        }
    }
</style>

<!-- WhatsApp Button -->
<script src="/js/whatsapp.js"></script>

</body>
</html>
