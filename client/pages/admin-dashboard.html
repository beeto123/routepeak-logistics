<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>RoutePeak Dashboard</title>

    <link rel="stylesheet" href="/css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* ========================================
           DASHBOARD - COMPLETE STYLES
           ======================================== */

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .page-header h1 {
            margin: 0;
            color: #0D1B3D;
            font-size: 32px;
        }

        .page-header h1 small {
            font-size: 16px;
            font-weight: 400;
            color: #666;
            display: block;
            margin-top: 5px;
        }

        .dashboard-cards {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            margin: 30px 0;
        }

        .dashboard-cards .card {
            background: white;
            padding: 25px 20px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,.06);
            text-align: center;
            transition: .3s;
        }

        .dashboard-cards .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,.1);
        }

        .dashboard-cards .card h3 {
            font-size: 14px;
            color: #999;
            margin-bottom: 8px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .dashboard-cards .card h1 {
            font-size: 36px;
            color: #FF6A00;
            font-weight: 700;
            margin: 0;
        }

        .dashboard-cards .card .icon {
            font-size: 28px;
            margin-bottom: 8px;
        }

        /* Chart Card */
        .chart-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,.06);
            margin-top: 30px;
        }

        .chart-card h2 {
            color: #0D1B3D;
            margin-bottom: 20px;
            font-size: 22px;
        }

        .chart-container {
            position: relative;
            height: 350px;
            max-width: 500px;
            margin: 0 auto;
        }

        .sidebar .active a {
            color: #FF6A00;
        }

        /* Mobile sidebar toggle */
        .mobile-sidebar-toggle {
            display: none;
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 1001;
            background: #0D1B3D;
            color: white;
            border: none;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
        }

        /* ========================================
           RESPONSIVE DESIGN
           ======================================== */

        @media (max-width: 1200px) {
            .dashboard-cards {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 992px) {
            .dashboard-cards {
                grid-template-columns: repeat(3, 1fr);
            }

            .chart-container {
                height: 280px;
                max-width: 400px;
            }
        }

        @media (max-width: 768px) {
            .mobile-sidebar-toggle {
                display: block;
            }

            .dashboard {
                display: block;
            }

            .sidebar {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 280px;
                height: 100vh;
                z-index: 1000;
                animation: slideIn 0.3s ease;
                background: #0D1B3D;
                padding: 30px;
                color: white;
                overflow-y: auto;
            }

            .sidebar.active {
                display: block;
            }

            /* Sidebar overlay */
            .sidebar-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.5);
                z-index: 999;
            }

            .sidebar-overlay.active {
                display: block;
            }

            main.content {
                padding: 20px 15px;
                margin-top: 10px;
                width: 100%;
            }

            .page-header h1 {
                font-size: 24px;
            }

            .page-header h1 small {
                font-size: 14px;
            }

            .dashboard-cards {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
                margin: 20px 0;
            }

            .dashboard-cards .card {
                padding: 18px 12px;
                border-radius: 12px;
            }

            .dashboard-cards .card h1 {
                font-size: 28px;
            }

            .dashboard-cards .card h3 {
                font-size: 12px;
            }

            .dashboard-cards .card .icon {
                font-size: 22px;
            }

            .chart-card {
                padding: 20px;
                border-radius: 12px;
                margin-top: 20px;
            }

            .chart-card h2 {
                font-size: 18px;
            }

            .chart-container {
                height: 220px;
                max-width: 100%;
            }
        }

        @media (max-width: 480px) {
            .dashboard-cards {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .dashboard-cards .card {
                padding: 14px 10px;
            }

            .dashboard-cards .card h1 {
                font-size: 22px;
            }

            .dashboard-cards .card h3 {
                font-size: 10px;
            }

            .dashboard-cards .card .icon {
                font-size: 18px;
            }

            .page-header h1 {
                font-size: 20px;
            }

            .chart-container {
                height: 200px;
            }

            .chart-card {
                padding: 15px;
            }

            .chart-card h2 {
                font-size: 16px;
            }
        }

        @keyframes slideIn {
            from {
                transform: translateX(-100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>

</head>

<body>

<!-- Mobile Sidebar Toggle -->
<button class="mobile-sidebar-toggle" onclick="toggleSidebar()">☰</button>

<!-- Sidebar Overlay -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="dashboard">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">

        <h2>🚚 RoutePeak</h2>

        <ul>

            <li class="active">
                <a href="/pages/admin-dashboard.html">
                    📊 Dashboard
                </a>
            </li>

            <li>
                <a href="/pages/create-shipment.html">
                    ➕ Create Shipment
                </a>
            </li>

            <li>
                <a href="/pages/manage-shipments.html">
                    📦 Manage Shipments
                </a>
            </li>

            <li>
                <a href="/tracking">
                    🔍 Public Tracking
                </a>
            </li>

            <li>
                <a href="#" onclick="logout()">
                    🚪 Logout
                </a>
            </li>

        </ul>

    </aside>

    <!-- Main Content -->
    <main class="content">

        <div class="page-header">
            <div>
                <h1>
                    📊 Dashboard
                    <small>Welcome back, Admin</small>
                </h1>
            </div>
        </div>

        <!-- Dashboard Cards -->
        <div class="dashboard-cards">

            <div class="card">
                <div class="icon">📦</div>
                <h3>Total</h3>
                <h1 id="totalShipments">0</h1>
            </div>

            <div class="card">
                <div class="icon">📋</div>
                <h3>Registered</h3>
                <h1 id="registeredShipments">0</h1>
            </div>

            <div class="card">
                <div class="icon">🚚</div>
                <h3>In Transit</h3>
                <h1 id="inTransitShipments">0</h1>
            </div>

            <div class="card">
                <div class="icon">✅</div>
                <h3>Delivered</h3>
                <h1 id="deliveredShipments">0</h1>
            </div>

            <div class="card">
                <div class="icon">🛃</div>
                <h3>Customs</h3>
                <h1 id="customsShipments">0</h1>
            </div>

        </div>

        <!-- Chart -->
        <div class="chart-card">
            <h2>📈 Shipment Statistics</h2>
            <div class="chart-container">
                <canvas id="shipmentChart"></canvas>
            </div>
        </div>

    </main>

</div>

<script src="/js/dashboard.js"></script>

<script>
    // ========================================
    // SIDEBAR TOGGLE
    // ========================================

    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
    }

    // Close sidebar when clicking a link
    document.querySelectorAll('.sidebar a').forEach(link => {
        link.addEventListener('click', function() {
            if (window.innerWidth <= 768) {
                const sidebar = document.getElementById('sidebar');
                const overlay = document.getElementById('sidebarOverlay');
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
            }
        });
    });

    // ========================================
    // LOGOUT
    // ========================================

    function logout() {
        if (confirm('Are you sure you want to logout?')) {
            localStorage.removeItem('token');
            localStorage.removeItem('admin');
            window.location.href = '/pages/admin-login.html';
        }
    }

    // ========================================
    // CHECK AUTH
    // ========================================

    const token = localStorage.getItem("token");
    if (!token) {
        window.location.href = "/pages/admin-login.html";
    }

    // Display admin name
    try {
        const admin = JSON.parse(localStorage.getItem("admin"));
        if (admin && admin.name) {
            document.querySelector('.page-header small').textContent = 'Welcome back, ' + admin.name;
        }
    } catch (e) {}
</script>

            localStorage.removeItem('token');

        }

</script>

</body>

</html>
