<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Shipment | RoutePeak Logistics</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* ========================================
           CREATE SHIPMENT - COMPLETE STYLES
           ======================================== */

        /* Page Header */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .page-header h1 {
            margin: 0;
            color: #0D1B3D;
            font-size: 32px;
        }

        .page-header h1 small {
            font-size: 16px;
            font-weight: 400;
            color: #666;
            display: block;
            margin-top: 5px;
        }

        .back-btn {
            background: #0D1B3D;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: .3s;
            text-decoration: none;
            display: inline-block;
            white-space: nowrap;
        }

        .back-btn:hover {
            background: #1a2d5a;
            transform: translateY(-2px);
        }

        /* Form Container */
        .form-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,.08);
        }

        .form-section {
            margin-bottom: 35px;
        }

        .form-section h3 {
            color: #0D1B3D;
            font-size: 18px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .form-section h3 span {
            color: #FF6A00;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-grid input,
        .form-grid select,
        .form-grid textarea {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            transition: .3s;
            background: #fafafa;
            font-family: 'Inter', sans-serif;
        }

        .form-grid input:focus,
        .form-grid select:focus,
        .form-grid textarea:focus {
            outline: none;
            border-color: #FF6A00;
            background: white;
            box-shadow: 0 4px 20px rgba(255,106,0,.1);
        }

        .form-grid textarea {
            resize: vertical;
            min-height: 80px;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .submit-btn {
            background: #FF6A00;
            color: white;
            padding: 16px 40px;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: .3s;
            width: 100%;
            margin-top: 20px;
        }

        .submit-btn:hover {
            background: #e85f00;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255,106,0,.3);
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .sidebar .active a {
            color: #FF6A00;
        }

        /* ========================================
           RESPONSIVE DESIGN
           ======================================== */

        /* Tablets */
        @media (max-width: 992px) {
            .form-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .full-width {
                grid-column: 1;
            }

            .form-container {
                padding: 30px;
            }
        }

        /* Mobile Phones */
        @media (max-width: 768px) {
            .page-header {
                flex-direction: column;
                align-items: flex-start;
                width: 100%;
            }

            .page-header h1 {
                font-size: 24px;
                width: 100%;
            }

            .page-header h1 small {
                font-size: 14px;
            }

            .back-btn {
                width: 100%;
                text-align: center;
                padding: 14px;
            }

            .form-container {
                padding: 20px;
                border-radius: 12px;
            }

            .form-section h3 {
                font-size: 16px;
            }

            .form-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .form-grid input,
            .form-grid select,
            .form-grid textarea {
                padding: 12px 14px;
                font-size: 14px;
                border-radius: 10px;
            }

            .form-grid textarea {
                min-height: 60px;
            }

            .submit-btn {
                padding: 14px;
                font-size: 15px;
                border-radius: 10px;
            }

            .full-width {
                grid-column: 1;
            }

            /* Sidebar adjustments */
            .sidebar {
                display: none;
            }

            .sidebar.active {
                display: block;
                position: fixed;
                top: 0;
                left: 0;
                width: 280px;
                height: 100vh;
                z-index: 1000;
                animation: slideIn 0.3s ease;
            }

            /* Mobile menu toggle for sidebar */
            .mobile-sidebar-toggle {
                display: block;
                position: fixed;
                top: 15px;
                left: 15px;
                z-index: 1001;
                background: #0D1B3D;
                color: white;
                border: none;
                padding: 12px 16px;
                border-radius: 10px;
                font-size: 20px;
                cursor: pointer;
            }

            .dashboard {
                display: block;
            }

            main.content {
                padding: 20px 15px;
                margin-top: 10px;
            }
        }

        /* Small Phones */
        @media (max-width: 480px) {
            .page-header h1 {
                font-size: 20px;
            }

            .page-header h1 small {
                font-size: 12px;
            }

            .form-container {
                padding: 15px;
            }

            .form-section h3 {
                font-size: 14px;
            }

            .form-grid input,
            .form-grid select,
            .form-grid textarea {
                padding: 10px 12px;
                font-size: 13px;
                border-radius: 8px;
            }

            .submit-btn {
                padding: 12px;
                font-size: 14px;
            }

            .back-btn {
                font-size: 14px;
                padding: 12px;
            }
        }

        /* Animation for sidebar */
        @keyframes slideIn {
            from {
                transform: translateX(-100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Hide mobile toggle on desktop */
        .mobile-sidebar-toggle {
            display: none;
        }
    </style>
</head>
<body>

<!-- Mobile Sidebar Toggle -->
<button class="mobile-sidebar-toggle" onclick="toggleSidebar()">☰</button>

<div class="dashboard">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <h2>🚚 RoutePeak</h2>
        <ul>
            <li>
                <a href="/pages/admin-dashboard.html">
                    📊 Dashboard
                </a>
            </li>
            <li class="active">
                <a href="/pages/create-shipment.html">
                    ➕ Create Shipment
                </a>
            </li>
            <li>
                <a href="/pages/manage-shipments.html">
                    📦 Manage Shipments
                </a>
            </li>
            <li>
                <a href="/tracking">
                    🔍 Public Tracking
                </a>
            </li>
            <li>
                <a href="#" onclick="logout()">
                    🚪 Logout
                </a>
            </li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="content">
        <div class="page-header">
            <div>
                <h1>
                    📦 Create New Shipment
                    <small>Enter shipment details below</small>
                </h1>
            </div>
            <a href="/pages/manage-shipments.html" class="back-btn">← Back to Shipments</a>
        </div>

        <div class="form-container">
            <form id="shipmentForm">
                <!-- Sender Information -->
                <div class="form-section">
                    <h3>👤 Sender <span>Information</span></h3>
                    <div class="form-grid">
                        <input id="sender_name" placeholder="Full Name *" required>
                        <input id="sender_phone" placeholder="Phone Number">
                        <input id="sender_email" placeholder="Email Address" type="email">
                        <textarea id="sender_address" placeholder="Full Address" class="full-width" rows="2"></textarea>
                    </div>
                </div>

                <!-- Receiver Information -->
                <div class="form-section">
                    <h3>📬 Receiver <span>Information</span></h3>
                    <div class="form-grid">
                        <input id="receiver_name" placeholder="Full Name *" required>
                        <input id="receiver_phone" placeholder="Phone Number">
                        <input id="receiver_email" placeholder="Email Address" type="email">
                        <textarea id="receiver_address" placeholder="Full Address" class="full-width" rows="2"></textarea>
                    </div>
                </div>

                <!-- Shipment Information -->
                <div class="form-section">
                    <h3>🚚 Shipment <span>Details</span></h3>
                    <div class="form-grid">
                        <input id="origin" placeholder="Origin City *" required>
                        <input id="destination" placeholder="Destination City *" required>
                        <input id="package_type" placeholder="Package Type (e.g., Box, Envelope)">
                        <input id="weight" type="number" step="0.01" placeholder="Weight (kg)">
                        <input id="shipping_cost" type="number" step="0.01" placeholder="Shipping Cost ($)">
                        <input id="estimated_delivery" type="date">
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    🚀 Create Shipment
                </button>
            </form>
        </div>
    </main>
</div>

<script src="/js/createShipment.js"></script>

<script>
    // Toggle sidebar on mobile
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        sidebar.classList.toggle('active');
    }

    // Close sidebar when clicking a link
    document.querySelectorAll('.sidebar a').forEach(link => {
        link.addEventListener('click', function() {
            const sidebar = document.getElementById('sidebar');
            if (window.innerWidth <= 768) {
                sidebar.classList.remove('active');
            }
        });
    });

    // Logout function
    function logout() {
        if (confirm('Are you sure you want to logout?')) {
            localStorage.removeItem('token');
            localStorage.removeItem('admin');
            window.location.href = '/pages/admin-login.html';
        }
    }

    // Check if user is logged in
    const token = localStorage.getItem("token");
    if (!token) {
        window.location.href = "/pages/admin-login.html";
    }
</script>

    <script>
    function logout() {
        if (confirm('Are you sure you want to logout?')) {
            localStorage.removeItem('token');
            localStorage.removeItem('admin');
            window.location.href = '/pages/admin-login.html';
        }
    }
</script>

</body>
</html>
