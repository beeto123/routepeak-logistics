<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Manage Shipments | RoutePeak Logistics</title>

    <link rel="stylesheet" href="/css/style.css">

    <style>
        /* ========================================
           MANAGE SHIPMENTS - COMPLETE STYLES
           ======================================== */

        /* Page Header */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .page-header h1 {
            margin: 0;
            color: #0D1B3D;
            font-size: 32px;
        }

        .page-header h1 small {
            font-size: 16px;
            font-weight: 400;
            color: #666;
            display: block;
            margin-top: 5px;
        }

        .new-btn {
            background: #FF6A00;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: .3s;
            text-decoration: none;
            display: inline-block;
            white-space: nowrap;
        }

        .new-btn:hover {
            background: #e85f00;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255,106,0,.3);
        }

        /* Stats Summary */
        .stats-summary {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .stat-chip {
            background: white;
            padding: 12px 24px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,.05);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            flex: 1;
            min-width: 120px;
            justify-content: center;
        }

        .stat-chip span {
            font-weight: 600;
            color: #0D1B3D;
        }

        .stat-chip .count {
            color: #FF6A00;
            font-size: 22px;
            font-weight: 700;
        }

        /* Search Bar */
        .search-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin: 25px 0;
            flex-wrap: wrap;
        }

        .search-bar input {
            flex: 1;
            min-width: 250px;
            padding: 14px 20px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            background: #fafafa;
            font-size: 15px;
            transition: .3s;
        }

        .search-bar input:focus {
            outline: none;
            border-color: #FF6A00;
            background: white;
            box-shadow: 0 4px 20px rgba(255,106,0,.1);
        }

        /* Table Container */
        .table-container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,.08);
            overflow-x: auto;
        }

        .shipment-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px;
        }

        .shipment-table th {
            background: #0D1B3D;
            color: white;
            padding: 14px 18px;
            text-align: left;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .shipment-table th:first-child {
            border-radius: 12px 0 0 0;
        }

        .shipment-table th:last-child {
            border-radius: 0 12px 0 0;
        }

        .shipment-table td {
            padding: 14px 18px;
            border-bottom: 1px solid #f0f0f0;
            color: #263238;
            font-size: 14px;
            vertical-align: middle;
        }

        .shipment-table tr:hover {
            background: #f8faff;
        }

        .shipment-table tr:last-child td {
            border-bottom: none;
        }

        /* Status Badges */
        .status-badge {
            display: inline-block;
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            min-width: 80px;
            white-space: nowrap;
        }

        .status-registered {
            background: #e8e8e8;
            color: #666;
        }

        .status-transit {
            background: #d4e9ff;
            color: #1a73e8;
        }

        .status-customs {
            background: #fff3d4;
            color: #e67e22;
        }

        .status-delivered {
            background: #d4f5d4;
            color: #27ae60;
        }

        .status-out {
            background: #f0d4f5;
            color: #8e44ad;
        }

        /* Action Buttons */
        .action-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 6px 14px;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: .3s;
            white-space: nowrap;
        }

        .action-btn:hover {
            transform: translateY(-2px);
        }

        .action-view {
            background: #3498db;
        }

        .action-view:hover {
            background: #2980b9;
            box-shadow: 0 4px 15px rgba(52,152,219,.3);
        }

        .action-edit {
            background: #f39c12;
        }

        .action-edit:hover {
            background: #d68910;
            box-shadow: 0 4px 15px rgba(243,156,18,.3);
        }

        .action-delete {
            background: #e74c3c;
        }

        .action-delete:hover {
            background: #c0392b;
            box-shadow: 0 4px 15px rgba(231,76,60,.3);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state h3 {
            color: #0D1B3D;
            margin-bottom: 10px;
        }

        .empty-state a {
            color: #FF6A00;
            font-weight: 600;
            text-decoration: none;
        }

        .empty-state a:hover {
            text-decoration: underline;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .sidebar .active a {
            color: #FF6A00;
        }

        /* Mobile sidebar toggle */
        .mobile-sidebar-toggle {
            display: none;
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 1001;
            background: #0D1B3D;
            color: white;
            border: none;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }

        .sidebar-overlay.active {
            display: block;
        }

        /* ========================================
           RESPONSIVE DESIGN
           ======================================== */

        /* Tablets */
        @media (max-width: 992px) {
            .stat-chip {
                min-width: 100px;
                padding: 10px 16px;
                font-size: 13px;
            }

            .stat-chip .count {
                font-size: 18px;
            }

            .shipment-table {
                min-width: 600px;
                font-size: 13px;
            }

            .shipment-table th,
            .shipment-table td {
                padding: 10px 14px;
            }
        }

        /* Mobile Phones */
        @media (max-width: 768px) {
            .mobile-sidebar-toggle {
                display: block;
            }

            .dashboard {
                display: block;
            }

            .sidebar {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 280px;
                height: 100vh;
                z-index: 1000;
                animation: slideIn 0.3s ease;
                background: #0D1B3D;
                padding: 30px;
                color: white;
                overflow-y: auto;
            }

            .sidebar.active {
                display: block;
            }

            main.content {
                padding: 20px 15px;
                margin-top: 10px;
                width: 100%;
            }

            .page-header {
                flex-direction: column;
                align-items: flex-start;
                width: 100%;
            }

            .page-header h1 {
                font-size: 24px;
                width: 100%;
            }

            .page-header h1 small {
                font-size: 14px;
            }

            .new-btn {
                width: 100%;
                text-align: center;
                padding: 14px;
            }

            .stats-summary {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 10px;
                width: 100%;
            }

            .stat-chip {
                min-width: auto;
                padding: 10px 14px;
                font-size: 12px;
                justify-content: center;
            }

            .stat-chip .count {
                font-size: 16px;
            }

            .search-bar {
                flex-direction: column;
                width: 100%;
            }

            .search-bar input {
                min-width: auto;
                width: 100%;
                padding: 12px 16px;
                font-size: 14px;
            }

            .table-container {
                padding: 10px;
                border-radius: 12px;
                width: 100%;
                overflow-x: auto;
            }

            .shipment-table {
                min-width: 500px;
                font-size: 12px;
            }

            .shipment-table th,
            .shipment-table td {
                padding: 8px 10px;
                font-size: 12px;
            }

            .status-badge {
                font-size: 10px;
                padding: 4px 10px;
                min-width: 60px;
            }

            .action-group {
                flex-direction: column;
                gap: 4px;
            }

            .action-btn {
                padding: 5px 10px;
                font-size: 11px;
                width: 100%;
                text-align: center;
            }

            .action-btn:hover {
                transform: none;
            }
        }

        /* Small Phones */
        @media (max-width: 480px) {
            .page-header h1 {
                font-size: 20px;
            }

            .stats-summary {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }

            .stat-chip {
                padding: 8px 12px;
                font-size: 11px;
            }

            .stat-chip .count {
                font-size: 14px;
            }

            .table-container {
                padding: 8px;
            }

            .shipment-table {
                min-width: 400px;
                font-size: 11px;
            }

            .shipment-table th,
            .shipment-table td {
                padding: 6px 8px;
                font-size: 11px;
            }

            .status-badge {
                font-size: 9px;
                padding: 3px 8px;
                min-width: 50px;
            }

            .action-btn {
                font-size: 10px;
                padding: 4px 8px;
            }

            .new-btn {
                font-size: 14px;
                padding: 12px;
            }
        }

        @keyframes slideIn {
            from {
                transform: translateX(-100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>

</head>

<body>

    <!-- Mobile Sidebar Toggle -->
    <button class="mobile-sidebar-toggle" onclick="toggleSidebar()">☰</button>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <div class="dashboard">

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">

            <h2>🚚 RoutePeak</h2>

            <ul>

                <li>
                    <a href="/pages/admin-dashboard.html">
                        📊 Dashboard
                    </a>
                </li>

                <li>
                    <a href="/pages/create-shipment.html">
                        ➕ Create Shipment
                    </a>
                </li>

                <li class="active">
                    <a href="/pages/manage-shipments.html">
                        📦 Manage Shipments
                    </a>
                </li>

                <li>
                    <a href="/tracking">
                        🔍 Public Tracking
                    </a>
                </li>

                <li>
                    <a href="#" onclick="logout()">
                        🚪 Logout
                    </a>
                </li>

            </ul>

        </aside>

        <!-- Main Content -->
        <main class="content">

            <!-- Page Header -->
            <div class="page-header">
                <div>
                    <h1>
                        📦 Manage Shipments
                        <small>View and manage all your shipments</small>
                    </h1>
                </div>
                <a href="/pages/create-shipment.html" class="new-btn">
                    ➕ New Shipment
                </a>
            </div>

            <!-- Stats Summary -->
            <div class="stats-summary" id="statsSummary">
                <!-- Populated by JavaScript -->
            </div>

            <!-- Search Bar -->
            <div class="search-bar">
                <input
                    type="text"
                    id="searchInput"
                    placeholder="🔍 Search by tracking number, sender, receiver, or destination..."
                >
            </div>

            <!-- Table -->
            <div class="table-container">
                <div id="shipmentsList">
                    <p style="text-align:center;padding:40px;color:#999;">Loading shipments...</p>
                </div>
            </div>

        </main>

    </div>

    <script src="/js/manageShipments.js"></script>

    <script>
        // ========================================
        // SIDEBAR TOGGLE
        // ========================================

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        // Close sidebar when clicking a link
        document.querySelectorAll('.sidebar a').forEach(link => {
            link.addEventListener('click', function() {
                if (window.innerWidth <= 768) {
                    const sidebar = document.getElementById('sidebar');
                    const overlay = document.getElementById('sidebarOverlay');
                    sidebar.classList.remove('active');
                    overlay.classList.remove('active');
                }
            });
        });

        // ========================================
        // LOGOUT
        // ========================================

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('token');
                localStorage.removeItem('admin');
                window.location.href = '/pages/admin-login.html';
            }
        }

        // ========================================
        // CHECK AUTH
        // ========================================

        const token = localStorage.getItem("token");
        if (!token) {
            window.location.href = "/pages/admin-login.html";
        }
    </script>

    <script>
    function logout() {
        if (confirm('Are you sure you want to logout?')) {
            localStorage.removeItem('token');
            localStorage.removeItem('admin');
            window.location.href = '/pages/admin-login.html';
        }
    }
</script>

</body>

</html>
